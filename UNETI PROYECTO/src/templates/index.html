<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- se exporta los estilos y scripts de Bootstrap desde un CDN (Content Delivery Network) para utilizar en la página web. Esto permite que la página tenga un diseño responsive y 
    estilos predefinidos sin necesidad de descargar e incluir los archivos de Bootstrap localmente. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>
    <!--Barra nevagadora para ir de un  archivo html a otro -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Panel de Gestión</a>
        <div class="ms-auto">
            <a href="{{ url_for('login') }}" class="btn btn-outline-danger btn-sm">
                <i class="bi bi-box-arrow-left"></i> Salir
            </a>
        </div>
    </div>
</nav>
    <h1 class="text-center mt-5 nb-5 text-primary">Gestion de datos de aprendices</h1>
    <!-- indicamos que el formulario se enviará a la misma ruta actual, y se utilizará el método POST para enviar
    los datos al servidor.-->
    <div class="container">
        <div class="card shadow">
            <div class="card-body">
                
                <!-- tabla -->
                 <!-- indicamos las cabceras de la tabla a mostrar -->
                 <table class="table table-bordered">
                    <th scope="col" ># </th> 
                    <th scope="col" >Cedula</th>
                    <th scope="col" >Nombre</th>
                    <th scope="col" >Apellido</th>
                    <th scope="col" >Sexo </th>
                    <th scope="col" >Fecha de nacimiento </th>
                    <th scope="col" >Edit </th>
                    <th scope="col" >Delete</th>
                    <th scope="col" >Estatus </th>
                 
                 <tbody> 
                    <!-- iniciamos un bucle para recorrer cada registro de la variable data, que contiene los datos de los aprendices obtenidos de la base de datos. -->
                    {% for d in data %}
                        <tr>
                            <!-- indicamos por cada columna el valor correspondiente del registro actual utilizando la sintaxis de
                            Jinja2 {{d.nombre_columna}} para mostrar los datos en la tabla. -->
                            <td>{{d.id_aprendices}}</td>
                            <td>{{d.cedula}}</td>
                            <td>{{d.nombre}}</td>
                            <td>{{d.apellido}}</td>
                            <td>{{d.sexo}}</td>
                            <td>{{d.fecha_nacimiento}}</td>
                            <!-- indicamos que al hacer clic en el botón "Edit", se abrirá un modal con el ID correspondiente al aprendiz que se desea editar. -->
                            <td><button class="=btn btn-primary brn-sm" id="btn-edit{{d.id_aprendices}}" data-bs-toggle="modal" data-bs-target="#modal{{d.id_aprendices}}">Edit</button></td>
                            <!-- indicamos que al hacer clic en el enlace "Delete", 
                            se enviará una solicitud a la ruta 'delete' con el ID del usuario que se desea eliminar. -->
                            <td><a href="{{url_for('delete',id_aprendices=d.id_aprendices)}}" class="= btn btn-danger btn-sm">Delete</a></td>
                            <td>{{d.estatus}}</td>
                        </tr>

                    <!-- Modal -->
                     <!-- este modal genera una ventana emergente para editar los datos del aprendiz que indiquemos -->
                    <div class="modal fade" id="modal{{d.id_aprendices}}" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h1 class="modal-title fs-5" id="exampleModalLabel">{{d.username}}</h1>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                    <div class="modal-body">
                                        <!-- indicamos que el formulario se enviará a la ruta "/edit/{{d.id_aprendices}}" utilizando el método POST para enviar los datos al servidor
                                         esto permitirá actualizar los datos del aprendiz con el ID correspondiente en la base de datos. -->
                                        <form action="/edit/{{d.id_aprendices}}" method="POST">
                                            <label>Cedula</label>
                                            <input type="text" class="form-control mb-3" name="cedula" value="{{d.cedula}}">
                                            <label>Nombre</label>
                                            <input type="text" class="form-control mb-3" name="nombre" value="{{d.nombre}}">
                                            <label>Apellido</label>
                                            <input type="text" class="form-control mb-3" name="apellido" value="{{d.apellido}}">
                                            <label>Sexo</label>
                                            <!-- mantenemos el menu desplegable para el sexo -->
                                            <select name="sexo" class="form-select mb-3" required>
                                                <option value="" selected disabled>Seleccione...</option>
                                                <option value="M" {% if d.sexo == 'M' %}selected{% endif %}>Masculino (M)</option>
                                                <option value="F" {% if d.sexo == 'F' %}selected{% endif %}>Femenino (F)</option>
                                            </select>
                                            <!-- y la seleccion de la fecha con el formato descrito en login.html -->
                                            <label>Fecha de nacimiento</label>
                                            <input type="date" name="fecha_nacimiento" class="form-control mb-3" max="2026-02-10" value="{{d.fecha_nacimiento}}">
                                    
                                            </div>
                                        <div class="modal-footer">
                                            <button type="submit" class="btn btn-primary">Save changes</button>
                                        </div>
                                        </form>
                            </div>
                        </div>
                    </div>

                    {% endfor %}
                 </tbody>
                </table> 
            </div>

        </div> 

    </div>
    
</body>
</html>
